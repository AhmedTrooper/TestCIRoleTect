name: "publish"

on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- APPLE ---
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            config_flag: ""
            args: "--target aarch64-apple-darwin"

          # --- LINUX DISTRIBUTIONS (DIVIDED TO PREVENT OVERWRITES) ---
          - platform: "ubuntu-22.04" 
            target: "x86_64-unknown-linux-gnu"
            config_flag: "--config src-tauri/tauri.ubuntu22.conf.json" # Keeps files distinct
            args: ""
          - platform: "ubuntu-24.04" 
            target: "x86_64-unknown-linux-gnu"
            config_flag: "" # Uses default name (RoleTect) for modern 24/26 setups
            args: ""
          - platform: "ubuntu-24.04-arm" 
            target: "aarch64-unknown-linux-gnu"
            config_flag: ""
            args: ""

          # --- WINDOWS ---
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            vcpkg_triplet: "x64-windows-static-md"
            config_flag: ""
            args: ""
          - platform: "windows-latest"
            target: "aarch64-pc-windows-msvc"
            vcpkg_triplet: "arm64-windows-static-md"
            config_flag: ""
            args: "--target aarch64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- UBUNTU SETUP ---
      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libicu-dev libpng-dev xdg-utils fontconfig
          echo "RUSTFLAGS=" >> $GITHUB_ENV

      # --- MACOS SETUP ---
      - name: Setup Tectonic Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config icu4c libpng
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/icu4c/lib/pkgconfig:/opt/homebrew/opt/libpng/lib/pkgconfig:/usr/local/opt/icu4c/lib/pkgconfig:/usr/local/opt/libpng/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "TECTONIC_PKGCONFIG_FORCE_SEMI_STATIC=1" >> $GITHUB_ENV

      # --- WINDOWS SETUP ---
      - name: Setup vcpkg and Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com ${{ github.workspace }}\vcpkg
          ${{ github.workspace }}\vcpkg\bootstrap-vcpkg.bat
          ${{ github.workspace }}\vcpkg\vcpkg.exe install icu:${{ matrix.vcpkg_triplet }} libpng:${{ matrix.vcpkg_triplet }} harfbuzz[graphite2]:${{ matrix.vcpkg_triplet }} graphite2:${{ matrix.vcpkg_triplet }} fontconfig:${{ matrix.vcpkg_triplet }}

          echo "TECTONIC_DEP_BACKEND=vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_TRIPLET=${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/std:c++17" >> $env:GITHUB_ENV

      # --- BUILD AND PUBLISH ---
      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: roletect-v__VERSION__
          releaseName: "RoleTect v__VERSION__"
          releaseDraft: true
          prerelease: false
          # Combines configuration overrides to differentiate filenames
          args: ${{ matrix.args }} ${{ matrix.config_flag }}
          releaseBody: |
            ## 📥 Which file should I download?
            Select the correct file from the **Assets** list below based on your operating system and computer architecture.

            ### 🍎 macOS
            * **Apple Silicon (M1/M2/M3/M4)**: Download the `aarch64` file (e.g., `.dmg` or `.app.tar.gz`)

            ### 🪟 Windows
            * **Standard PC (Most Intel/AMD)**: Download the `x64` file (e.g., `-setup.exe` or `.msi`)
            * **Windows on ARM (Snapdragon/Copilot+)**: Download the `arm64` or `aarch64` file (e.g., `-setup.exe`)

            ### 🐧 Linux
            * **Ubuntu 22.04 LTS**: Download the `RoleTect-Ubuntu22` asset bundle.
            * **Ubuntu 24.04 / Kubuntu 26.04**: Download the standard `RoleTect` asset bundle.
